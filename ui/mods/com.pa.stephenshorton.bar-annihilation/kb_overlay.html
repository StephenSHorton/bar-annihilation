<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>BAR Annihilation overlay</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    body { background: rgba(8,12,18,0.82); font-family: Exo, "Segoe UI", sans-serif; color:#cfe3f2; }
    #wrap { position:absolute; left:0; top:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center; }
    #card { padding:42px 60px; background: rgba(14,20,28,0.97); border:2px solid #2b6c9c;
            border-radius:12px; box-shadow:0 10px 50px rgba(0,0,0,.6); text-align:center; }
    #card h1 { margin:0 0 12px; color:#7fd1ff; font-size:32px; letter-spacing:.04em; }
    #card p  { margin:0; color:#9fb3c6; font-size:16px; }
    #card .k { color:#ffd877; font-weight:bold; }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="card">
      <h1>BAR ANNIHILATION</h1>
      <p>Overlay panel renders over the game. Press <span class="k">\</span> or <span class="k">Esc</span> to close.</p>
    </div>
  </div>
</body>
</html>
