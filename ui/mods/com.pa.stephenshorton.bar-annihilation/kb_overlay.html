<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta locns="live_game" />
  <noloc><title>BAR Annihilation: Key Overlay</title></noloc>
  <link href="bundle://boot/boot.css" rel="stylesheet" type="text/css" />
  <script src="bundle://boot/boot.js" type="text/javascript"></script>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    body.body_panel { background:rgba(8,12,18,0.82); font-family:Exo,"Segoe UI",sans-serif; color:#cfe3f2; }
    #bar-root { position:absolute; left:0; top:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center; }
    .kb-panel { padding:18px 22px; background:rgba(14,20,28,0.97); border:1px solid #2b6c9c; border-radius:10px; box-shadow:0 10px 50px rgba(0,0,0,.6); }
    .kb-title { font-size:18px; color:#7fd1ff; letter-spacing:.04em; margin-bottom:10px; }
    .kb-tabs { display:flex; margin-bottom:12px; }
    .kb-tab { padding:6px 16px; margin-right:6px; font-size:12px; color:#9fb3c6; background:rgba(20,28,38,0.9);
              border:1px solid #33485c; border-radius:6px; cursor:pointer; }
    .kb-tab:hover { color:#cfe3f2; border-color:#3f7fb0; }
    .kb-tab.active { color:#7fd1ff; background:#1c3145; border-color:#2b6c9c; }
    .kb-tab.held { color:#bfffce; border-color:#5fbf7f; }
    .kb-row { display:flex; margin-bottom:5px; }
    .kb-key { position:relative; width:56px; height:56px; border:1px solid #33485c; border-radius:6px; background:#162230;
              display:flex; flex-direction:column; padding:4px 5px; box-sizing:border-box; overflow:hidden; margin-right:5px; }
    .kb-key .kb-cap { font-size:11px; color:#9fb3c6; font-weight:600; }
    .kb-key .kb-act { font-size:8px; line-height:1.04; margin-top:auto; color:#bcd;
                      display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:3;
                      overflow:hidden; text-overflow:ellipsis; word-break:break-word; }
    .kb-key.bound { background:#1c3145; border-color:#3f7fb0; }
    .kb-key.bound .kb-act { color:#d4e6f5; }
    .kb-key.ours { background:#2a2410; border-color:#d2a73a; }
    .kb-key.ours .kb-act { color:#ffd877; }
    .kb-key.modk { background:#22303f; }
    .kb-key.modk.held { background:#2f5a3a; border-color:#5fbf7f; color:#bfffce; }
    .kb-key.wide { width:auto; min-width:56px; flex:1; }
    .kb-legend { margin-top:10px; font-size:10px; color:#8aa3b8; display:flex; }
    .kb-legend span { margin-right:18px; }
    .kb-swatch { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:middle; }
  </style>
</head>
<body class="body_panel">
  <div id="bar-root"></div>
  <script type="text/javascript">
    // The live_game host pushes { tabs, layers:{combo:rowsHtml}, held } via
    // panel.message('bar.render', ...). We render the tab bar + the active layer.
    // active = held modifier (if exactly one held) else the clicked tab.
    var model = {};
    var handlers = {};
    var state = { tabs: [], layers: {}, held: '', clicked: '' };
    var lastPayload = null;

    function activeCombo() {
      if (state.held && state.layers.hasOwnProperty(state.held)) return state.held;
      if (state.layers.hasOwnProperty(state.clicked)) return state.clicked;
      return '';
    }

    function legendHtml() {
      return '<div class="kb-legend">'
        + '<span><span class="kb-swatch" style="background:#1c3145;border:1px solid #3f7fb0;"></span>PA action</span>'
        + '<span><span class="kb-swatch" style="background:#2a2410;border:1px solid #d2a73a;"></span>BAR Annihilation (overrides PA)</span>'
        + '<span><span class="kb-swatch" style="background:#2f5a3a;border:1px solid #5fbf7f;"></span>modifier / active layer</span>'
        + '<span>Hold a modifier or click a tab &mdash; Esc to close</span></div>';
    }

    function render() {
      var root = document.getElementById('bar-root');
      if (!root) return;
      var active = activeCombo();
      var tabs = '';
      for (var i = 0; i < state.tabs.length; i++) {
        var tc = state.tabs[i].combo, tl = state.tabs[i].label;
        var cls = 'kb-tab' + (tc === active ? ' active' : '') + ((state.held && tc === state.held) ? ' held' : '');
        tabs += '<div class="' + cls + '" data-combo="' + tc + '">' + tl + '</div>';
      }
      root.innerHTML = '<div class="kb-panel">'
        + '<div class="kb-title">BAR Annihilation &mdash; Key Bindings</div>'
        + '<div class="kb-tabs">' + tabs + '</div>'
        + '<div class="kb-grid">' + (state.layers[active] || '') + '</div>'
        + legendHtml() + '</div>';
    }

    $(document).ready(function () {
      handlers['bar.render'] = function (payload) {
        if (!payload || !payload.layers) return;
        var s = JSON.stringify(payload);
        if (s === lastPayload) return;          // dedupe interval re-pushes (no flicker)
        lastPayload = s;
        state.tabs = payload.tabs || [];
        state.layers = payload.layers || {};
        state.held = payload.held || '';
        render();
      };
      // tab clicks (event delegation; tabs carry data-combo)
      document.addEventListener('click', function (e) {
        var t = e.target;
        while (t && t.getAttribute) {
          var combo = t.getAttribute('data-combo');
          if (combo !== null) { state.clicked = combo; render(); return; }
          t = t.parentNode;
        }
      });
      app.registerWithCoherent(model, handlers);
    });
  </script>
</body>
</html>
