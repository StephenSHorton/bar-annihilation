<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta locns="live_game" />
  <noloc><title>BAR Annihilation: Drag Layer</title></noloc>
  <link href="bundle://boot/boot.css" rel="stylesheet" type="text/css" />
  <script src="bundle://boot/boot.js" type="text/javascript"></script>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    body.body_panel { background:transparent; cursor:move; }
    #dl { position:absolute; left:0; top:0; right:0; bottom:0; }
  </style>
</head>
<body class="body_panel">
  <!-- Fullscreen capture surface shown by core.js's drag manager ONLY during an
       active drag (hidden otherwise, so it never blocks game input). It is at 0,0
       fullscreen, so clientX/clientY == screen coordinates. -->
  <div id="dl"></div>
  <script type="text/javascript">
    var model = {}, handlers = {};
    var pend = null, raf = 0;
    function send(type, x, y) {
      try { if (window.api && api.Panel && api.Panel.query) api.Panel.query(api.Panel.parentId, type, { x: x, y: y }); } catch (err) {}
    }
    function flush() { raf = 0; if (pend) { send('drag:move', pend.x, pend.y); pend = null; } }
    $(document).ready(function () {
      // Coalesce raw mousemoves to one update per animation frame: a Coherent
      // query + panel reposition per raw move backs up and feels laggy; sending
      // only the freshest position each frame is smooth and never queues.
      document.addEventListener('mousemove', function (e) {
        pend = { x: e.clientX, y: e.clientY };
        if (window.requestAnimationFrame) { if (!raf) raf = requestAnimationFrame(flush); }
        else send('drag:move', e.clientX, e.clientY);
      }, false);
      document.addEventListener('mouseup', function (e) {
        if (raf && window.cancelAnimationFrame) { cancelAnimationFrame(raf); raf = 0; }
        if (pend) { send('drag:move', pend.x, pend.y); pend = null; }   // flush the final position first
        send('drag:end', e.clientX, e.clientY);
      }, false);
      app.registerWithCoherent(model, handlers);
    });
  </script>
</body>
</html>
