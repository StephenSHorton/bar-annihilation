<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta locns="live_game" />
  <noloc><title>BAR Annihilation: Keys Button</title></noloc>
  <link href="bundle://boot/boot.css" rel="stylesheet" type="text/css" />
  <script src="bundle://boot/boot.js" type="text/javascript"></script>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    body.body_panel { background:transparent; font-family:Exo,"Segoe UI",sans-serif; }
    .kbtn-b { position:absolute; left:0; top:0; right:0; bottom:0; box-sizing:border-box;
              display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600;
              color:#cfe3f2; background:rgba(14,20,28,0.9); border:1px solid #2b6c9c; cursor:pointer; letter-spacing:.05em; }
    .kbtn-b:hover { background:rgba(95,168,224,0.45); border-color:#5fa8e0; color:#fff; }
  </style>
</head>
<body class="body_panel">
  <!-- A persistent button (its own panel; the host live_game DOM never paints).
       A plain CLICK toggles the keyboard overlay; a press-and-DRAG (>3px) hands
       off to core.js's drag manager, which moves this panel and remembers where
       you put it. -->
  <div class="kbtn-b" data-action="toggle">Keys</div>
  <script type="text/javascript">
    var model = {}, handlers = {};
    var PANEL = 'barann-keysbtn-panel';
    var THRESH = 3;            // px of movement before a press becomes a drag
    var press = null;          // { sx, sy, gx, gy, dragging } while the mouse is down
    function q(type, payload) { try { if (window.api && api.Panel && api.Panel.query) api.Panel.query(api.Panel.parentId, type, payload || {}); } catch (e) {} }
    $(document).ready(function () {
      document.addEventListener('mousedown', function (e) {
        press = { sx: e.clientX, sy: e.clientY, gx: e.offsetX, gy: e.offsetY, dragging: false };
        e.preventDefault();
      }, false);
      document.addEventListener('mousemove', function (e) {
        if (!press || press.dragging) return;
        if (Math.abs(e.clientX - press.sx) > THRESH || Math.abs(e.clientY - press.sy) > THRESH) {
          press.dragging = true;
          q('drag:start', { panel: PANEL, gx: press.gx, gy: press.gy });   // hand off to the fullscreen drag layer
        }
      }, false);
      document.addEventListener('mouseup', function (e) {
        if (press) {
          if (press.dragging) q('drag:end', {});      // backup end in case the layer missed the mouseup
          else q('overlay:toggle', {});               // a click (no drag) toggles the overlay
        }
        press = null;
      }, false);
      app.registerWithCoherent(model, handlers);
    });
  </script>
</body>
</html>
