<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta locns="live_game" />
  <noloc><title>BAR Annihilation: Grid Build Menu</title></noloc>
  <link href="bundle://boot/boot.css" rel="stylesheet" type="text/css" />
  <script src="bundle://boot/boot.js" type="text/javascript"></script>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    body.body_panel { background:transparent; font-family:Exo,"Segoe UI",sans-serif; color:#cfe3f2; }
    #gm-root { position:absolute; left:0; top:0; right:0; bottom:0; }
    .gm-wrap { position:absolute; left:0; top:0; right:0; padding:8px 10px; box-sizing:border-box;
               background:rgba(12,18,26,0.92); border:1px solid #2b6c9c; border-radius:0;
               box-shadow:0 8px 36px rgba(0,0,0,.55); }
    .gm-title { font-size:12px; color:#7fd1ff; letter-spacing:.03em; margin-bottom:6px; text-transform:uppercase;
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gm-row { display:flex; margin-bottom:5px; }
    .gm-row:last-of-type { margin-bottom:0; }
    .gm-cell { position:relative; width:74px; height:60px; margin-right:5px; box-sizing:border-box;
               border:1px solid #33485c; border-radius:0; background:#111a24; overflow:hidden; }
    .gm-row .gm-cell:last-child { margin-right:0; }
    .gm-cell.empty { background:rgba(20,28,38,0.4); border-style:dashed; border-color:#26333f; }
    .gm-cell.filled { cursor:pointer; }
    .gm-cell.filled:hover { border-color:#5fa8e0; box-shadow:inset 0 0 0 1px #5fa8e0; }
    .gm-img { position:absolute; left:0; top:0; width:100%; height:100%; object-fit:contain; }
    .gm-name { position:absolute; left:0; right:0; bottom:0; padding:2px 3px; font-size:9px; line-height:1.05;
               color:#d4e6f5; text-align:center; background:rgba(8,12,18,0.55);
               white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }   /* fallback when no icon */
    .gm-cap { position:absolute; top:2px; right:4px; font-size:10px; font-weight:700; color:#e8f2ff;
              text-shadow:0 0 3px #000, 0 0 3px #000; }
    .gm-cost { position:absolute; left:4px; bottom:2px; font-size:10px; font-weight:600; color:#f0d472;
               text-shadow:0 0 3px #000, 0 0 3px #000; }
    .gm-q { position:absolute; right:4px; bottom:2px; font-size:12px; font-weight:700; color:#bfffce;
            text-shadow:0 0 3px #000, 0 0 3px #000; }
    .gm-sub { color:#9fc3dd; font-size:10px; font-weight:400; margin-left:6px; text-transform:none; }
    .gm-foot { display:flex; align-items:center; margin-top:6px; }
    .gm-btn { display:inline-block; padding:3px 12px; font-size:11px; font-weight:600; color:#dcefff;
              background:rgba(43,108,156,0.35); border:1px solid #2b6c9c; cursor:pointer; letter-spacing:.03em; }
    .gm-btn:hover { background:rgba(95,168,224,0.45); border-color:#5fa8e0; }
    .gm-page { margin-left:auto; }   /* push the page button to the right */
    .gm-cell.gm-cat { border-color:#5fa8e0; box-shadow:inset 0 0 0 1px rgba(95,168,224,.4); }
    .gm-cell.gm-prev { opacity:.55; }
    .gm-cell.gm-prev .gm-img { filter:grayscale(35%); }
    .gm-catlabel { position:absolute; left:0; right:0; bottom:0; padding:2px 1px; font-size:9px; font-weight:700;
                   text-align:center; color:#dcefff; background:rgba(20,46,68,0.9); letter-spacing:.02em;
                   white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gm-catcount { position:absolute; top:2px; left:4px; font-size:9px; font-weight:600; color:#bcd8ef;
                   text-shadow:0 0 3px #000, 0 0 3px #000; }
  </style>
</head>
<body class="body_panel">
  <div id="gm-root"></div>
  <script type="text/javascript">
    // The live_game host pushes { open, cells:[12], caps:[12], title } via
    // panel.message('grid:update', ...). cells[i] = null | {specId,label,icon,metal,queue}.
    // Cell order is visual reading order: row0 = Q W E R, row1 = A S D F, row2 = Z X C V.
    // Clicks on a cell are routed back to the host via api.Panel.message(parentId, 'grid:click', ...).
    var model = {};
    var handlers = {};
    var last = null;

    function num(n) { return (n == null) ? '' : (n >= 1000 ? Math.round(n / 100) / 10 + 'k' : '' + Math.round(n)); }
    function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function cellHtml(cell, cap, slot) {
      if (!cell) return '<div class="gm-cell empty"><div class="gm-cap">' + esc(cap) + '</div></div>';
      var cls = 'gm-cell filled';
      if (cell.isCategory) cls += ' gm-cat';
      if (cell.preview) cls += ' gm-prev';
      var inner = '';
      if (cell.icon) inner += '<img class="gm-img" src="' + esc(cell.icon) + '" />';
      else inner += '<div class="gm-name">' + esc(cell.label) + '</div>';
      inner += '<div class="gm-cap">' + esc(cap) + '</div>';
      if (cell.isCategory) {
        inner += '<div class="gm-catcount">' + cell.catCount + '</div>';
        inner += '<div class="gm-catlabel">' + esc(cell.catLabel) + '</div>';
      } else if (!cell.preview) {
        if (cell.metal != null) inner += '<div class="gm-cost">' + num(cell.metal) + '</div>';
        if (cell.queue > 0) inner += '<div class="gm-q">' + cell.queue + '</div>';
      }
      var tip = cell.isCategory ? (cell.catLabel + ' (' + cell.catCount + ')') : cell.label;
      return '<div class="' + cls + '" data-slot="' + slot + '" title="' + esc(tip) + '">' + inner + '</div>';
    }

    function render(p) {
      var root = document.getElementById('gm-root');
      if (!root) return;
      if (!p || !p.open || !p.cells) { root.innerHTML = ''; return; }
      var caps = p.caps || ['Q','W','E','R','A','S','D','F','Z','X','C','V'];
      var rows = '';
      for (var r = 0; r < 3; r++) {
        rows += '<div class="gm-row">';
        for (var c = 0; c < 4; c++) { var i = r * 4 + c; rows += cellHtml(p.cells[i], caps[i], i); }
        rows += '</div>';
      }
      var title = esc(p.title || 'Build') + (p.sub ? '<span class="gm-sub">' + esc(p.sub) + '</span>' : '');
      var back = (p.mode === 'category') ? '<div class="gm-btn" data-action="back">&#8592; Shift</div>' : '';
      var page = (p.pages > 1) ? '<div class="gm-btn gm-page" data-action="page">Page ' + p.page + '/' + p.pages + ' &#8594;</div>' : '';
      var foot = (back || page) ? ('<div class="gm-foot">' + back + page + '</div>') : '';
      root.innerHTML = '<div class="gm-wrap">'
        + '<div class="gm-title">' + title + '</div>'
        + rows
        + foot + '</div>';
    }

    var lastHover = -2;
    function sendHover(slot) {
      try { if (window.api && api.Panel && api.Panel.query) api.Panel.query(api.Panel.parentId, 'grid:hover', { slot: slot }); } catch (e) {}
    }
    function onHoverMove(e) {
      var slot = -1, t = e.target;
      while (t && t.getAttribute) { var s = t.getAttribute('data-slot'); if (s !== null) { slot = parseInt(s, 10); break; } t = t.parentNode; }
      if (slot !== lastHover) { lastHover = slot; sendHover(slot); }
    }

    function routeClick(e) {
      var t = e.target;
      while (t && t.getAttribute) {
        var act = t.getAttribute('data-action');
        if (act === 'back' || act === 'page') {
          e.preventDefault();
          try { if (window.api && api.Panel && api.Panel.query) api.Panel.query(api.Panel.parentId, act === 'back' ? 'grid:back' : 'grid:page', {}); } catch (err) {}
          return;
        }
        var s = t.getAttribute('data-slot');
        if (s !== null) {
          e.preventDefault();
          var msg = { slot: parseInt(s, 10), button: e.button || 0, shift: !!e.shiftKey, ctrl: !!e.ctrlKey, alt: !!e.altKey };
          try {
            // panel.query (not .message): 'panel.query' is always whitelisted in the
            // parent's panel.ready filter, so it reaches handlers['grid:click'] via onQuery.
            if (window.api && api.Panel && api.Panel.query) api.Panel.query(api.Panel.parentId, 'grid:click', msg);
            else console.log('[bar-annihilation] gridmenu CHILD click but api.Panel.query missing');
          } catch (err) { console.log('[bar-annihilation] gridmenu CHILD click send error: ' + (err && err.message)); }
          return;
        }
        t = t.parentNode;
      }
    }

    $(document).ready(function () {
      handlers['grid:update'] = function (payload) {
        var s = JSON.stringify(payload);
        if (s === last) return;                 // dedupe interval re-pushes
        last = s;
        render(payload);
      };
      document.addEventListener('mousedown', routeClick, false);     // catches L (0) and R (2)
      document.addEventListener('contextmenu', function (e) { e.preventDefault(); }, false);
      document.addEventListener('mousemove', onHoverMove, false);     // hover -> tooltip (mouseover unreliable in Coherent)
      document.addEventListener('mouseout', function (e) { if (!e.relatedTarget && lastHover !== -1) { lastHover = -1; sendHover(-1); } }, false);
      app.registerWithCoherent(model, handlers);
    });
  </script>
</body>
</html>
