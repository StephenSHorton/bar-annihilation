<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta locns="live_game" />
  <noloc><title>BAR Annihilation: Build Placement Overlay</title></noloc>
  <link href="bundle://boot/boot.css" rel="stylesheet" type="text/css" />
  <script src="bundle://boot/boot.js" type="text/javascript"></script>
  <style>
    /* Transparent, no-input overlay VIEW composited ON TOP of the 3D (the
       live_game host doc paints BELOW the world). Dumb renderer: the host pushes
       the normalized drag stroke + per-building ghost slots via
       panel.message('build.draw'/'build.clear'). */
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:transparent !important; }
    #bc { position:absolute; left:0; top:0; width:100%; height:100%; display:block; }
  </style>
</head>
<body>
  <canvas id="bc"></canvas>
  <script type="text/javascript">
    var model = {};
    var handlers = {};
    var cv = null, ctx = null, last = null;

    function size() {
      if (!cv) return;
      var w = window.innerWidth || 1920, h = window.innerHeight || 1080;
      if (cv.width !== w) cv.width = w;
      if (cv.height !== h) cv.height = h;
    }
    function clear() { if (ctx) ctx.clearRect(0, 0, cv.width, cv.height); }

    // Dev diagnostic: flip to true to draw the overlay's real repaint rate top-left.
    var SHOW_FPS = false;
    var frames = 0, fpsT0 = 0, fps = 0;

    // payload = { stroke:[[nx,ny],...], ghosts:[[nx,ny],...], color:'#rrggbb' }
    // coords normalized 0..1 (resolution-independent); scaled by canvas size.
    function draw(p) {
      if (!ctx) return;
      size();
      var W = cv.width, H = cv.height;
      ctx.clearRect(0, 0, W, H);                      // full clear each frame — the smooth path
      if (!p) return;
      var col = p.color || '#6ef06e';
      var stroke = p.stroke || [], ghosts = p.ghosts || [], i;

      if (SHOW_FPS) {
        var now = Date.now(); frames++;
        if (now - fpsT0 >= 500) { fps = Math.round(frames * 1000 / (now - fpsT0)); frames = 0; fpsT0 = now; }
        ctx.globalAlpha = 1; ctx.font = '22px monospace'; ctx.fillStyle = '#ffea00';
        ctx.fillText('overlay fps: ' + fps, 28, 44);
      }

      if (stroke.length >= 2) {                       // the drag line
        ctx.lineWidth = 2.5; ctx.strokeStyle = col; ctx.globalAlpha = 0.5;
        ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(stroke[0][0] * W, stroke[0][1] * H);
        for (i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i][0] * W, stroke[i][1] * H);
        ctx.stroke(); ctx.globalAlpha = 1;
      }
      for (i = 0; i < ghosts.length; i++) {           // one ghost marker per building slot
        var x = ghosts[i][0] * W, y = ghosts[i][1] * H, r = 7;
        ctx.globalAlpha = 0.85; ctx.fillStyle = col;
        ctx.fillRect(x - r, y - r, r * 2, r * 2);     // square = building footprint
        ctx.globalAlpha = 1; ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,0,0,0.7)';
        ctx.strokeRect(x - r, y - r, r * 2, r * 2);
      }
    }

    $(document).ready(function () {
      cv = document.getElementById('bc');
      ctx = cv ? cv.getContext('2d') : null;
      size();
      window.addEventListener('resize', function () { size(); if (last) draw(last); });
      handlers['build.draw'] = function (payload) { last = payload; draw(payload); };
      handlers['build.clear'] = function () { last = null; clear(); };
      app.registerWithCoherent(model, handlers);
    });
  </script>
</body>
</html>
